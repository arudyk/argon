services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8443:443/tcp"
    environment:
      TZ: "America/New_York"
      FTLCONF_webserver_api_password: "${PIHOLE_PASSWORD}"
      FTLCONF_dns_upstreams: "1.1.1.1;1.0.0.1"
      FTLCONF_dns_listeningMode: "all"
    volumes:
      - ./data/pihole/etc:/etc/pihole
      - ./data/pihole/dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    dns:
      - 127.0.0.1
      - 1.1.1.1

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: "America/New_York"
    volumes:
      - ./data/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro

  zwave-js-ui:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-js-ui
    restart: unless-stopped
    ports:
      - "8091:8091"
      - "3000:3000"
    environment:
      TZ: "America/New_York"
      KEY_S0_Legacy: "${ZWAVE_KEY_S0_Legacy}"
      KEY_S2_Unauthenticated: "${ZWAVE_KEY_S2_Unauthenticated}"
      KEY_S2_Authenticated: "${ZWAVE_KEY_S2_Authenticated}"
      KEY_S2_AccessControl: "${ZWAVE_KEY_S2_AccessControl}"
    volumes:
      - ./data/zwave-js-ui:/usr/src/app/store
    devices:
      - /dev/serial/by-id/usb-0658_0200-if00:/dev/zwave

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gmc300:
    build: ./gmc300
    container_name: gmc300
    restart: unless-stopped
    environment:
      PORT: "/dev/ttyUSB0"
      BAUDRATE: "115200"
      REPEAT: "60"
      HA_TOKEN: "${GMC300_HA_TOKEN}"
    devices:
      - /dev/serial/by-id/usb-1a86_USB2.0-Serial-if00-port0:/dev/ttyUSB0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./data/kiwix:/data
    command: '*.zim'

  maps:
    image: nginx:alpine
    container_name: maps
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./map:/srv/map:ro
      - ./data/tiles:/srv/tiles:ro
      - ./map/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "America/New_York"
      PLEX_CLAIM: "${PLEX_CLAIM}"
      PUID: "1000"
      PGID: "1000"
    volumes:
      - ./data/plex/config:/config
      - ./data/plex/transcode:/transcode
      - /mnt/media:/data

  ddns:
    image: alpine:latest
    container_name: ddns
    restart: unless-stopped
    environment:
      DDNS_HOST: "home"
      DDNS_DOMAIN: "${DDNS_DOMAIN}"
      DDNS_PASSWORD: "${DDNS_PASSWORD}"
    command: >
      sh -c "apk add --no-cache curl &&
             while true; do
               MY_PUBLIC_IP=$$(curl -s https://dynamicdns.park-your-domain.com/getip) &&
               curl -s \"https://dynamicdns.park-your-domain.com/update?host=$$DDNS_HOST&domain=$$DDNS_DOMAIN&password=$$DDNS_PASSWORD&ip=$$MY_PUBLIC_IP\";
               sleep 1800;
             done"
